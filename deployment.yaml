apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-calculator
  labels:
    app: flask-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-calculator
  template:
    metadata:
      labels:
        app: flask-calculator
    spec:
      containers:
        - name: flask-calculator
          image: crazyfrog46/flask-calculator:15
          ports:
            - containerPort: 5000